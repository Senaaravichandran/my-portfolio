<svg xmlns="http://www.w3.org/2000/svg" width="480" height="660" viewBox="0 0 480 660" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.95 0 0 0 0 1 0 0 0 0.92 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.1" fill="#9DFFF2" opacity="0.68"/>
    </pattern>
    <mask id="scatter-a">
      <text x="42" y="200" fill="white" font-family="Consolas, monospace" font-size="126" font-weight="700" transform="rotate(-9 96 170)">Σ</text>
    </mask>
    <mask id="scatter-b">
      <text x="324" y="225" fill="white" font-family="Consolas, monospace" font-size="116" font-weight="700" transform="rotate(14 372 190)">↯</text>
    </mask>
    <mask id="scatter-c">
      <text x="198" y="470" fill="white" font-family="Consolas, monospace" font-size="116" font-weight="700" transform="rotate(8 252 430)">&lt;/&gt;</text>
    </mask>
    <mask id="scatter-d">
      <text x="44" y="585" fill="white" font-family="Consolas, monospace" font-size="106" font-weight="700" transform="rotate(-15 95 540)">{}</text>
    </mask>
  </defs>
  <g filter="url(#glow)">
    <rect x="12" y="98" width="165" height="150" fill="url(#dots)" mask="url(#scatter-a)" opacity="0.82"/>
    <rect x="300" y="92" width="154" height="168" fill="url(#dots)" mask="url(#scatter-b)" opacity="0.92"/>
    <rect x="175" y="380" width="230" height="135" fill="url(#dots)" mask="url(#scatter-c)" opacity="0.9"/>
    <rect x="16" y="488" width="150" height="126" fill="url(#dots)" mask="url(#scatter-d)" opacity="0.72"/>
  </g>
  <g filter="url(#glow)" opacity="0.45">
    <circle cx="92" cy="28" r="1.8" fill="#71C4FF"/>
    <circle cx="105" cy="36" r="1.2" fill="#9DFFF2"/>
    <circle cx="400" cy="52" r="1.8" fill="#71C4FF"/>
    <circle cx="423" cy="66" r="1.1" fill="#9DFFF2"/>
    <circle cx="43" cy="306" r="1.3" fill="#71C4FF"/>
    <circle cx="450" cy="344" r="1.4" fill="#9DFFF2"/>
    <circle cx="270" cy="613" r="1.5" fill="#71C4FF"/>
  </g>
</svg>
